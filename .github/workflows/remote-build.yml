name: Remote Build Docker
on:
  workflow_dispatch: # Vous permet de lancer le build manuellement d'un clic
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-external:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout de l'autre repo
        uses: actions/checkout@v4
        with:
          repository: 'slopus/happy' 
          ref: 'main' # Ou 'master'

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happy-server:latest
