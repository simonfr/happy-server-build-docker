name: Remote Build Docker
on:
  workflow_dispatch: # Vous permet de lancer le build manuellement d'un clic

jobs:
  build-external:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout de l'autre repo
        uses: actions/checkout@v4
        with:
          # C'est ICI que vous mettez le repo cible (ex: torvalds/linux)
          repository: 'slopus/happy' 
          ref: 'main' # Ou 'master'

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # L'image sera sauvegardée sur VOTRE compte
          tags: ghcr.io/${{ github.repository_owner }}/image-extraite:latest
